<html>
<head>
<title>pibble squisher</title>
<link rel="icon" href="pibble.ico" type="image/x-icon">

<style>
body {
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
	background: #f0f0f0;
}

img {
	width: 200px;
	height: auto;
	cursor: pointer;
	transition: transform 0.2s ease;
}
	
.top-text {
	position: absolute;
	top: 0;
	center: 0;
	margin: 0;
	padding: 10px;
}

.bottom-text {
	position: absolute;
	bottom: 0;
	center: 0;
	margin: 0;
	padding: 10px;
}
	
.squish {
	transform: scaleY(0.1) scaleX(1.9);
	}
</style>
</head>
<body>

<div class="top-text">
    <h1>this is pibble. click to squish him!</h1>
</div>

<img id="pibblePic" src="pibble.png" alt="pibble">

<img id="evilPibble" src="evil-pibble.png" alt="evil pibble" style="display:none;">

<audio id="pibbleSquish" src="pibble_squish.mp3"></audio>

<audio id="evilPibbleLaugh" src="evil-pibble-laugh.mp3"></audio>

<div class="bottom-text">
    <h1>number of squishes: <span id="count">0</span></h1>
</div>

<script>
	
let count = 0;
	
const normalPibble = document.getElementById("pibblePic");
const evilPibble = document.getElementById("evilPibble");
const counter = document.getElementById("count");
const sound = document.getElementById("pibbleSquish");

function randomRange(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

let nextEvilClick = randomRange(1, 66);

normalPibble.addEventListener("click", () => {
	normalPibble.classList.add("squish");
	setTimeout(() => { normalPibble.classList.remove("squish"); }, 200);
	
	sound.currentTime = 0;
	sound.play();

	count++;
	counter.textContent = count;

	if (count === nextEvilClick) {
		normalPibble.style.display = "none";
		evilPibble.style.display = "block";

		const subtractClicks = randomRange(5, 30);
		count -= subtractClicks;
		if (count < 0) count = 0;
		counter.textContent = count;
		
		setTimeout(() => {
			evilPibble.style.display = "none";
			normalPibble.style.display = "block";
			nextEvilClick = count + randomRange(1, 66);
		}, 4000);
	}
});

//evilPibble.addEventListener("click", () => {
    //evilPibble.classList.add("evilPibbleLaugh");
    //setTimeout(() => { evilPibble.classList.remove("evilPibbleLaugh"); }, 200);

    //sound.currentTime = 0;
    //sound.play();
//});
</script>

</body>
</html>
